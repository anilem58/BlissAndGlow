version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: blissandglow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blissandglow_db
      MYSQL_USER: blissuser
      MYSQL_PASSWORD: blisspass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - blissandglow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blissandglow-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/blissandglow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: blissuser
      DB_PASSWORD: blisspass
      DB_DRIVER: com.mysql.cj.jdbc.Driver
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blissandglow-network
    volumes:
      - ./logs:/usr/local/tomcat/logs

volumes:
  mysql_data:

networks:
  blissandglow-network:
    driver: bridge
